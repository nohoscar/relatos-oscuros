<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Relatos Oscuros</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="fog-overlay"></div>
  <div class="vignette"></div>

  <div class="container">
    <header>
      <div class="candle">🕯️</div>
      <h1>Relatos Oscuros</h1>
      <p class="subtitle">Donde las sombras tienen voz</p>
      <div class="header-line"></div>
    </header>

    <section id="stories-list" class="stories-list"></section>

    <!-- Player -->
    <div id="player" class="player hidden">
      <div class="player-inner">
        <div class="player-info">
          <span id="player-title" class="player-title"></span>
          <span id="player-fragment" class="player-fragment"></span>
        </div>
        <div class="player-controls">
          <button id="btn-prev" class="btn-control" title="Anterior">⏮</button>
          <button id="btn-play" class="btn-control btn-play" title="Reproducir">▶</button>
          <button id="btn-next" class="btn-control" title="Siguiente">⏭</button>
        </div>
        <div class="player-progress">
          <div id="progress-bar" class="progress-bar">
            <div id="progress-fill" class="progress-fill"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
